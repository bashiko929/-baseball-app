<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseball App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#111; color:#fff; }
.bottom-nav {
 position:fixed; bottom:0; width:100%; display:flex;
 background:#000; justify-content:space-around;
}
.bottom-nav button { flex:1; color:#fff; background:none; border:none; }
.active { color:#0d6efd; }
</style>
</head>

<body>

<h2 class="text-center mt-3">⚾ Baseball App</h2>

<div id="summary" class="content">通算</div>
<div id="batting" class="content" style="display:none;">打撃</div>
<div id="settings" class="content" style="display:none;">
<button onclick="addPlayer()">選手追加</button>
</div>

<div class="bottom-nav">
<button onclick="tab('summary')">通算</button>
<button onclick="tab('batting')">打撃</button>
<button onclick="tab('settings')">設定</button>
</div>

<script>
let state={players:[]};

function tab(id){
 document.querySelectorAll('.content').forEach(c=>c.style.display='none');
 document.getElementById(id).style.display='block';
}

function addPlayer(){
 const name=prompt("名前");
 if(!name)return;
 state.players.push(name);
 alert("追加完了");
}
</script>

</body>
</html>
