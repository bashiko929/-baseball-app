<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baseball Pro - Cloud Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0b0f1a;
            --card-bg: linear-gradient(145deg, #1e293b, #0f172a);
            --accent: #00ffcc;
            --primary: #3b82f6;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin-bottom: 90px;
            font-size: 18px;
        }

        .header {
            padding: 20px;
            text-align: center;
            font-weight: 800;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 2px solid #1e293b;
            margin-bottom: 20px;
            position: relative;
        }

        .sync-status {
            position: absolute;
            top: 5px;
            right: 15px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .label-text {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }

        .glow {
            color: var(--accent);
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            background: #000;
            border-top: 2px solid #1e293b;
            z-index: 1000;
            height: 75px;
        }

        .bottom-nav button {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
        }

        .bottom-nav button.active {
            color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        .fab {
            position: fixed;
            bottom: 110px;
            right: 25px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            font-size: 36px;
            border: none;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #chart-container {
            position: relative;
            height: 250px;
            margin-bottom: 10px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
        }

        .form-control, .form-select {
            background: #0f172a !important;
            border: 2px solid #334155 !important;
            color: white !important;
            font-size: 18px;
            border-radius: 12px;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            height: 55px;
            font-weight: 700;
            border-radius: 12px;
        }

        .hidden-input { display: none; }
        
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
    </style>
</head>

<body>

<div id="loading-overlay">
    <div class="spinner-border text-primary mb-3" role="status"></div>
    <div class="label-text">クラウドに接続中...</div>
</div>

<div class="header">
    ⚾ Baseball Pro
    <span id="sync-indicator" class="sync-status text-muted">Offline</span>
</div>

<div class="container">
    <!-- Summary View -->
    <div id="view-summary">
        <div class="card p-3">
            <div class="label-text">選手選択</div>
            <select id="playerSelect" class="form-select" onchange="renderDisplay()"></select>
        </div>

        <div class="card">
            <div id="chart-container">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <div id="stats-container"></div>

        <h6 class="label-text mt-4 mb-3">成績履歴（修正・削除可能）</h6>
        <div id="history-list"></div>
    </div>

    <!-- Settings View -->
    <div id="view-settings" style="display:none;">
        <button class="btn btn-outline-primary w-100 mb-4" data-bs-toggle="modal" data-bs-target="#playerModal" style="border-width: 2px;">＋ 新しい選手を登録</button>
        
        <h6 class="label-text mb-3">登録済み選手</h6>
        <div id="playerList"></div>

        <div class="card mt-4">
            <h6 class="label-text mb-3">クラウド同期情報</h6>
            <div id="cloud-info" class="small text-muted mb-3">サインインしています</div>
            <div class="row g-2">
                <div class="col-12">
                    <button class="btn btn-light btn-sm w-100 py-2" onclick="exportData()">📤 JSONで書き出し</button>
                </div>
            </div>
        </div>

        <button class="btn btn-sm btn-link text-danger w-100 mt-4 text-decoration-none" onclick="clearAllData()">全データを削除する</button>
    </div>
</div>

<button class="fab" onclick="openRecordModal()">＋</button>

<!-- Navigation -->
<div class="bottom-nav">
    <button id="btn-summary" onclick="switchTab('summary')" class="active">
        <span>📊</span><span>成績</span>
    </button>
    <button id="btn-settings" onclick="switchTab('settings')">
        <span>⚙️</span><span>設定</span>
    </button>
</div>

<!-- Modal: Player -->
<div class="modal fade" id="playerModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">選手の追加</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="label-text">名前</div>
                <input type="text" id="newPlayerName" class="form-control" placeholder="例：山田 太郎">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary w-100" onclick="handleNewPlayer()">保存する</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Record (Add/Edit) -->
<div class="modal fade" id="recordModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="recordModalTitle">今日の成績</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-record-id">
                <div class="mb-4">
                    <label class="label-text">日付</label>
                    <input type="date" id="input-date" class="form-control">
                </div>
                <div class="row g-4">
                    <div class="col-6">
                        <label class="label-text">打数</label>
                        <input type="number" id="input-ab" class="form-control" value="0" min="0">
                    </div>
                    <div class="col-6">
                        <label class="label-text">安打</label>
                        <input type="number" id="input-h" class="form-control" value="0" min="0">
                    </div>
                    <div class="col-6">
                        <label class="label-text">四死球</label>
                        <input type="number" id="input-bb" class="form-control" value="0" min="0">
                    </div>
                    <div class="col-6">
                        <label class="label-text">本塁打</label>
                        <input type="number" id="input-hr" class="form-control" value="0" min="0">
                    </div>
                </div>
                <div id="edit-delete-container" class="mt-4 text-center" style="display:none;">
                    <hr class="border-secondary">
                    <button class="btn btn-sm btn-link text-danger text-decoration-none" onclick="deleteRecord()">この記録を削除する</button>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary w-100" onclick="handleSaveRecord()">記録を保存する</button>
            </div>
        </div>
    </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- Firebase Initialization ---
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'baseball-pro-v3';

    let currentUser = null;
    let state = { players: [], records: [] };
    let chartInstance = null;
    const recordModal = new bootstrap.Modal(document.getElementById('recordModal'));

    // --- State Management with Cloud Sync ---
    const updateSyncIndicator = (status) => {
        const el = document.getElementById('sync-indicator');
        if (status === 'syncing') {
            el.innerText = 'Syncing...';
            el.className = 'sync-status text-warning';
        } else if (status === 'synced') {
            el.innerText = 'Cloud Synced';
            el.className = 'sync-status text-success';
        } else {
            el.innerText = 'Error';
            el.className = 'sync-status text-danger';
        }
    };

    // --- Auth Initialization ---
    const initApp = async () => {
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        } catch (error) {
            console.error("Auth error:", error);
            updateSyncIndicator('error');
        }
    };

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) {
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('cloud-info').innerText = `ユーザーID: ${user.uid}`;
            setupListeners(user.uid);
        }
    });

    // --- Data Listeners ---
    const setupListeners = (userId) => {
        const userDocRef = doc(db, 'artifacts', appId, 'users', userId, 'data', 'main');
        
        onSnapshot(userDocRef, (docSnap) => {
            if (docSnap.exists()) {
                state = docSnap.data();
            } else {
                state = { players: [], records: [] };
            }
            updatePlayerUI();
            renderDisplay();
            updateSyncIndicator('synced');
        }, (error) => {
            console.error("Firestore error:", error);
            updateSyncIndicator('error');
        });
    };

    const persistToCloud = async () => {
        if (!currentUser) return;
        updateSyncIndicator('syncing');
        try {
            const userDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'data', 'main');
            await setDoc(userDocRef, state);
            updateSyncIndicator('synced');
        } catch (error) {
            console.error("Cloud save failed:", error);
            updateSyncIndicator('error');
        }
    };

    // --- Original Logic Adapted for Cloud ---
    window.handleNewPlayer = () => {
        const input = document.getElementById('newPlayerName');
        if (!input.value.trim()) return;
        state.players.push({ id: Date.now().toString(), name: input.value.trim() });
        persistToCloud();
        input.value = '';
        bootstrap.Modal.getInstance(document.getElementById('playerModal')).hide();
    };

    window.handleSaveRecord = () => {
        const playerId = document.getElementById('playerSelect').value;
        if (!playerId) return alert("選手を登録してください");

        const id = document.getElementById('edit-record-id').value;
        const data = {
            id: id || Date.now().toString(),
            playerId,
            date: document.getElementById('input-date').value,
            ab: parseInt(document.getElementById('input-ab').value) || 0,
            h: parseInt(document.getElementById('input-h').value) || 0,
            bb: parseInt(document.getElementById('input-bb').value) || 0,
            hr: parseInt(document.getElementById('input-hr').value) || 0
        };

        if (id) {
            const index = state.records.findIndex(r => r.id === id);
            state.records[index] = data;
        } else {
            state.records.push(data);
        }
        
        persistToCloud();
        recordModal.hide();
    };

    window.deleteRecord = () => {
        const id = document.getElementById('edit-record-id').value;
        if (confirm("この記録を削除しますか？")) {
            state.records = state.records.filter(r => r.id !== id);
            persistToCloud();
            recordModal.hide();
        }
    };

    window.clearAllData = async () => {
        if (confirm("全データを削除します。よろしいですか？")) {
            state = { players: [], records: [] };
            await persistToCloud();
            location.reload();
        }
    };

    window.exportData = () => {
        const dataStr = JSON.stringify(state, null, 2);
        const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
        const name = 'baseball_backup_' + new Date().toISOString().split('T')[0] + '.json';
        const link = document.createElement('a');
        link.setAttribute('href', dataUri); link.setAttribute('download', name); link.click();
    };

    // --- UI Methods ---
    window.updatePlayerUI = () => {
        const select = document.getElementById('playerSelect');
        const list = document.getElementById('playerList');
        const current = select.value;
        
        select.innerHTML = state.players.map(p => `<option value="${p.id}" ${p.id === current ? 'selected' : ''}>${p.name}</option>`).join('');
        list.innerHTML = state.players.map(p => `
            <div class="history-item">
                <span class="fw-bold">${p.name}</span>
                <span class="badge bg-primary">クラウド同期中</span>
            </div>
        `).join('');
    };

    window.renderDisplay = () => {
        const playerId = document.getElementById('playerSelect').value;
        const pRecords = state.records
            .filter(r => r.playerId === playerId)
            .sort((a, b) => new Date(a.date) - new Date(b.date));

        let t = { ab: 0, h: 0, bb: 0, hr: 0 };
        const timeline = [];

        pRecords.forEach(r => {
            t.ab += r.ab; t.h += r.h; t.bb += r.bb; t.hr += r.hr;
            const avg = t.ab ? (t.h / t.ab) : 0;
            const slg = t.ab ? ((t.h + (t.hr * 3)) / t.ab) : 0;
            timeline.push({ date: r.date, avg, ops: avg + slg });
        });

        renderChart(timeline);
        renderStats(t);
        renderHistory(pRecords);
    };

    const renderHistory = (records) => {
        const container = document.getElementById('history-list');
        const sorted = [...records].reverse();
        container.innerHTML = sorted.map(r => `
            <div class="history-item">
                <div>
                    <div class="small text-muted">${r.date}</div>
                    <div>${r.ab}打数 ${r.h}安打 ${r.hr > 0 ? '<strong>' + r.hr + '本塁打</strong>' : ''}</div>
                </div>
                <button class="btn btn-sm btn-outline-primary" onclick="openRecordModal('${r.id}')">編集</button>
            </div>
        `).join('') || '<p class="text-center text-muted small py-3">履歴がありません</p>';
    };

    const renderChart = (data) => {
        const ctx = document.getElementById('chart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        if (!data.length) return;

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(d => d.date),
                datasets: [
                    { label: '打率', data: data.map(d => d.avg), borderColor: '#00ffcc', tension: 0.4, fill: false, borderWidth: 3 },
                    { label: 'OPS', data: data.map(d => d.ops), borderColor: '#3b82f6', tension: 0.4, fill: false, borderWidth: 3 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#fff', font: { weight: 'bold' } } } },
                scales: {
                    y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                }
            }
        });
    };

    const renderStats = (t) => {
        const avg = t.ab ? (t.h / t.ab) : 0;
        const obp = (t.ab + t.bb) ? (t.h + t.bb) / (t.ab + t.bb) : 0;
        const slg = t.ab ? ((t.h + t.hr * 3) / t.ab) : 0;
        const ops = obp + slg;

        document.getElementById('stats-container').innerHTML = `
            <div class="row g-3">
                <div class="col-6">
                    <div class="card mb-0">
                        <div class="label-text">打率</div>
                        <div class="stat-value ${avg >= 0.3 ? 'glow' : ''}">${avg.toFixed(3)}</div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card mb-0">
                        <div class="label-text">OPS</div>
                        <div class="stat-value ${ops >= 0.8 ? 'glow' : ''}">${ops.toFixed(3)}</div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card mb-0">
                        <div class="label-text">通算安打</div>
                        <div class="stat-value">${t.h}</div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card mb-0">
                        <div class="label-text">通算本塁打</div>
                        <div class="stat-value">${t.hr}</div>
                    </div>
                </div>
            </div>
        `;
    };

    window.openRecordModal = (recordId = null) => {
        const title = document.getElementById('recordModalTitle');
        const idInput = document.getElementById('edit-record-id');
        const deleteContainer = document.getElementById('edit-delete-container');
        
        if (recordId) {
            const r = state.records.find(rec => rec.id === recordId);
            title.innerText = "記録の編集";
            idInput.value = r.id;
            document.getElementById('input-date').value = r.date;
            document.getElementById('input-ab').value = r.ab;
            document.getElementById('input-h').value = r.h;
            document.getElementById('input-bb').value = r.bb;
            document.getElementById('input-hr').value = r.hr;
            deleteContainer.style.display = 'block';
        } else {
            title.innerText = "成績の入力";
            idInput.value = "";
            document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
            ['input-ab', 'input-h', 'input-bb', 'input-hr'].forEach(id => document.getElementById(id).value = 0);
            deleteContainer.style.display = 'none';
        }
        recordModal.show();
    };

    window.switchTab = (id) => {
        document.getElementById('view-summary').style.display = id === 'summary' ? 'block' : 'none';
        document.getElementById('view-settings').style.display = id === 'settings' ? 'block' : 'none';
        document.getElementById('btn-summary').classList.toggle('active', id === 'summary');
        document.getElementById('btn-settings').classList.toggle('active', id === 'settings');
    };

    // Start app
    initApp();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
