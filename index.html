<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseball Pro 完成版</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0b0f1a; color:#fff; font-family:sans-serif; margin-bottom:90px;}
.header {text-align:center;padding:20px;font-size:22px;font-weight:bold;}
.card {background:#111827;border-radius:15px;padding:15px;margin-bottom:15px;}
.bottom-nav{position:fixed;bottom:0;width:100%;display:flex;background:#000;}
.bottom-nav button{flex:1;color:#888;background:none;border:none;padding:10px;}
.bottom-nav button.active{color:#3b82f6;}
.fab{position:fixed;bottom:80px;right:20px;width:60px;height:60px;border-radius:50%;background:#3b82f6;color:#fff;font-size:28px;border:none;}
.history-item{background:#1f2937;padding:10px;border-radius:10px;margin-bottom:8px;display:flex;justify-content:space-between;}
.glow{color:#00ffcc;text-shadow:0 0 10px #00ffcc;}
</style>
</head>

<body>

<div class="header">⚾ Baseball Pro</div>

<div class="container">

<select id="playerSelect" class="form-select mb-3" onchange="renderDisplay()"></select>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div id="stats"></div>

<h6>履歴</h6>
<div id="history"></div>

</div>

<button class="fab" onclick="openModal()">＋</button>

<!-- モーダル -->
<div class="modal fade" id="modal">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content bg-dark text-white">

<div class="modal-header">
<h5 id="modalTitle">記録</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input type="hidden" id="editId">

<label>日付</label>
<input type="date" id="date" class="form-control mb-3">

<label>打数</label>
<input type="number" id="ab" class="form-control mb-2">

<label>安打</label>
<input type="number" id="h" class="form-control mb-2">

<label>四球</label>
<input type="number" id="bb" class="form-control mb-2">

<label>本塁打</label>
<input type="number" id="hr" class="form-control mb-2">

<button class="btn btn-danger w-100 mt-3" onclick="deleteRecord()" id="deleteBtn" style="display:none;">削除</button>

</div>

<div class="modal-footer">
<button class="btn btn-primary w-100" onclick="saveRecord()">保存</button>
</div>

</div>
</div>
</div>

<div class="bottom-nav">
<button onclick="switchTab()" class="active">成績</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

let state={players:[],records:[]}
let chart
const modal=new bootstrap.Modal(document.getElementById("modal"))

function save(){localStorage.setItem("data",JSON.stringify(state))}
function load(){const d=localStorage.getItem("data");if(d)state=JSON.parse(d)}

function init(){
if(state.players.length===0){
state.players.push({id:"1",name:"自分"})
}
updatePlayers()
renderDisplay()
}

function updatePlayers(){
const sel=document.getElementById("playerSelect")
sel.innerHTML=state.players.map(p=>`<option value="${p.id}">${p.name}</option>`).join("")
}

function openModal(id=null){
document.getElementById("editId").value=id||""
document.getElementById("deleteBtn").style.display=id?"block":"none"

if(id){
const r=state.records.find(x=>x.id===id)
document.getElementById("date").value=r.date
document.getElementById("ab").value=r.ab
document.getElementById("h").value=r.h
document.getElementById("bb").value=r.bb
document.getElementById("hr").value=r.hr
}else{
document.getElementById("date").value=new Date().toISOString().split("T")[0]
["ab","h","bb","hr"].forEach(id=>document.getElementById(id).value=0)
}

setTimeout(()=>document.getElementById("date").focus(),200)

modal.show()
}

function saveRecord(){

const date=document.getElementById("date").value
if(!date)return alert("日付入力して")

const data={
id:document.getElementById("editId").value||Date.now().toString(),
playerId:document.getElementById("playerSelect").value,
date:date,
ab:+document.getElementById("ab").value||0,
h:+document.getElementById("h").value||0,
bb:+document.getElementById("bb").value||0,
hr:+document.getElementById("hr").value||0
}

const idx=state.records.findIndex(r=>r.id===data.id)
if(idx>=0)state.records[idx]=data
else state.records.push(data)

save()
modal.hide()
renderDisplay()
}

function deleteRecord(){
const id=document.getElementById("editId").value
if(confirm("削除する？")){
state.records=state.records.filter(r=>r.id!==id)
save()
modal.hide()
renderDisplay()
}
}

function renderDisplay(){

const pid=document.getElementById("playerSelect").value

const list=state.records
.filter(r=>r.playerId===pid)
.sort((a,b)=>new Date(a.date)-new Date(b.date))

let t={ab:0,h:0,bb:0,hr:0}
let data=[]

list.forEach(r=>{
t.ab+=r.ab
t.h+=r.h
t.bb+=r.bb
t.hr+=r.hr

const avg=t.ab? t.h/t.ab:0
const obp=(t.ab+t.bb)?(t.h+t.bb)/(t.ab+t.bb):0
const slg=t.ab?(t.h+t.hr*3)/t.ab:0
const ops=obp+slg

data.push({date:r.date,avg,ops})
})

drawChart(data)
drawStats(t)
drawHistory(list)
}

function drawChart(data){

const ctx=document.getElementById("chart")

if(chart)chart.destroy()
if(!data.length)return

chart=new Chart(ctx,{
type:"line",
data:{
labels:data.map(d=>d.date),
datasets:[
{label:"打率",data:data.map(d=>d.avg),borderColor:"#00ffcc"},
{label:"OPS",data:data.map(d=>d.ops),borderColor:"#3b82f6"}
]
}
})
}

function drawStats(t){

const avg=t.ab? t.h/t.ab:0
const obp=(t.ab+t.bb)?(t.h+t.bb)/(t.ab+t.bb):0
const slg=t.ab?(t.h+t.hr*3)/t.ab:0
const ops=obp+slg

document.getElementById("stats").innerHTML=`
<div class="card">
<div class="${avg>=0.3?'glow':''}">打率 ${avg.toFixed(3)}</div>
<div class="${ops>=0.8?'glow':''}">OPS ${ops.toFixed(3)}</div>
</div>
`
}

function drawHistory(list){

const el=document.getElementById("history")

el.innerHTML=[...list].reverse().map(r=>`
<div class="history-item">
<div>${r.date} ${r.h}/${r.ab}</div>
<button onclick="openModal('${r.id}')">編集</button>
</div>
`).join("")
}

load()
init()

</script>

</body>
</html>
